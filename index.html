<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #a9c5d3; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* The container now has no borders, just big soft shadows */
        .container {
            background-color: #ffffff;
            width: 800px;
            min-height: 100vh;
            margin-top: 150px; /* Space for the logo to float above */
            box-shadow: 0 0 50px 10px rgba(0,0,0,0.4);
            padding-bottom: 50px;
        }

        .logo {
            width: 250px;
            /* This centers the logo relative to the container, then pushes it to the left */
            margin: 0 auto 10px auto;
            display: block;
            margin-left: calc(50% - 400px); 
        }

        .navbar {
            background: linear-gradient(to bottom, #ffffff 0%, #dcdcdc 50%, #b8b8b8 50%, #999999 100%);
            padding: 15px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(to bottom, #9bc2e6 0%, #5b9bd5 50%, #2f75b5 50%, #205886 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 5px 20px;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 1px #000;
            box-shadow: 0 0 5px 1px rgba(0,0,0,1);
        }

        .content {
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="logo-area">
        <img src="images/logo.svg" width="100%" alt="DNGUGotE3 Logo">
    </div>

    <div class="container">
        <div class="navbar">
            <a href="https://github.com/petdimveee/DNGUGotE3/tree/main" class="nav-btn">github</a>
            <a href="#" class="nav-btn">about</a>
            <a href="https://magnado.itch.io/dngg" class="nav-btn">itch</a>
        </div>

        <div class="content">
            <h1></h1>
            
            

        </div>
    </div>

</body>
</html>
