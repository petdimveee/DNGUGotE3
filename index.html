<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #a9c5d3; 
            margin: 0;
            padding: 20px 0; /* Add top padding to create space from the window edge */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .page-wrapper {
            width: 800px;
        }

        /* Logo is now flush against the navbar */
        .logo {
            width: 250px;
            display: block;
            margin-bottom: 10px; /* some space between logo and navbar */
            box-shadow: 0 0 20px 10px #ffffff;
            margin-left: 10px;
        }

        .container {
            background-color: #ffffff;
            width: 800px;
            min-height: 100vh;
            box-shadow: 0 0 50px 10px rgba(0,0,0,0.4);
            padding-bottom: 50px;
        }

        .navbar {
            background: linear-gradient(to bottom, #ffffff 0%, #dcdcdc 50%, #b8b8b8 50%, #999999 100%);
            padding: 15px;
            text-align: center;
            display: flex;
            justify-content: left;
            gap: 15px;
            border-bottom: 2px solid #555; /* Defines the navbar edge */
        }

        .nav-btn {
            background: linear-gradient(to bottom, #9bc2e6 0%, #5b9bd5 50%, #2f75b5 50%, #205886 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 5px 20px;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 1px #000;
            box-shadow: 0 0 5px 1px rgba(0,0,0,1);
            font-family: Arial, sans-serif;
        }

        .content {
            padding: 40px;
            text-align: left;
        }
        .btnblue {
            display: inline-block;
            text-align: center;
            vertical-align: middle;
            padding: 8px 11px;
            border: 1px solid #68adb0;
            border-radius: 20px;
            background: #95f7fc;
            background: -webkit-gradient(linear, left top, left bottom, from(#95f7fc), to(#68adb0));
       .btn {
          background: #adadad;
          background-image: -webkit-linear-gradient(top, #adadad, #5e5e5e);
          background-image: -moz-linear-gradient(top, #adadad, #5e5e5e);
          background-image: -ms-linear-gradient(top, #adadad, #5e5e5e);
          background-image: -o-linear-gradient(top, #adadad, #5e5e5e);
          background-image: linear-gradient(to bottom, #adadad, #5e5e5e);
          -webkit-border-radius: 6;
          -moz-border-radius: 6;
          border-radius: 6px;
          text-shadow: 2px 2px 6px #000000;
          -webkit-box-shadow: 7px 9px 10px #666666;
          -moz-box-shadow: 7px 9px 10px #666666;
          box-shadow: 7px 9px 10px #666666;
          font-family: Georgia;
          color: #ffffff;
          font-size: 60px;
          padding: 0px 7px 11px 7px;
          text-decoration: none;
        }

.btn:hover {
  background: #3cb0fd;
  background-image: -webkit-linear-gradient(top, #3cb0fd, #3498db);
  background-image: -moz-linear-gradient(top, #3cb0fd, #3498db);
  background-image: -ms-linear-gradient(top, #3cb0fd, #3498db);
  background-image: -o-linear-gradient(top, #3cb0fd, #3498db);
  background-image: linear-gradient(to bottom, #3cb0fd, #3498db);
  text-decoration: none;
}
    </style>
</head>
<body>

    <div class="page-wrapper">
        <img src="images/logo.svg" class="logo" alt="DNGUGotE3 Logo">
        
        <div class="container">
            <div class="navbar">
                <a href="https://github.com/petdimveee/DNGUGotE3/tree/main" class="nav-btn">github</a>
                <a href="#" class="nav-btn">about</a>
                <a href="https://magnado.itch.io/dngg" class="nav-btn">itch</a>
            </div>

            <div class="content">
                <p>Welcome to DNGUGotE3, a Fighting game mainly in Windows batch (.bat)!</p>
                <marquee>wow!</marquee>
                <button class="btn">WOW</button>
                </div>
        </div>
    </div>

</body>
</html>
