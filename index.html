<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #a9c5d3; 
            margin: 0;
            padding: 20px 0; /* Add top padding to create space from the window edge */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .page-wrapper {
            width: 800px;
        }

        /* Logo is now flush against the navbar */
        .logo {
            width: 250px;
            display: block;
            margin-bottom: 0; /* No space between logo and navbar */
        }

        .container {
            background-color: #ffffff;
            width: 800px;
            min-height: 100vh;
            box-shadow: 0 0 50px 10px rgba(0,0,0,0.4);
            padding-bottom: 50px;
        }

        .navbar {
            background: linear-gradient(to bottom, #ffffff 0%, #dcdcdc 50%, #b8b8b8 50%, #999999 100%);
            padding: 15px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 2px solid #555; /* Defines the navbar edge */
        }

        .nav-btn {
            background: linear-gradient(to bottom, #9bc2e6 0%, #5b9bd5 50%, #2f75b5 50%, #205886 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 5px 20px;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 1px #000;
            box-shadow: 0 0 5px 1px rgba(0,0,0,1);
            font-family: Arial, sans-serif;
        }

        .content {
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <img src="images/logo.svg" class="logo" alt="DNGUGotE3 Logo">
        
        <div class="container">
            <div class="navbar">
                <a href="https://github.com/petdimveee/DNGUGotE3/tree/main" class="nav-btn">github</a>
                <a href="#" class="nav-btn">about</a>
                <a href="https://magnado.itch.io/dngg" class="nav-btn">itch</a>
            </div>

            <div class="content">
                </div>
        </div>
    </div>

</body>
</html>
